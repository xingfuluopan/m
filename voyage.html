<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>致远塾 · 幸福罗盘</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f0e6;
            color: #3A2E28;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 1rem 0.8rem;
            scroll-behavior: smooth;
        }
        .lang-switch {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            position: fixed;
            top: 1rem;
            right: 1.5rem;
            z-index: 100;
            background-color: #f5f0e6;
            padding: 0.3rem 0.6rem;
            border-radius: 1.2rem;
        }
        .support-btn,
        .menu-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.4rem 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            line-height: 1.4;
            border-radius: 1rem;
            box-sizing: border-box;
            height: 2.2rem;
            vertical-align: middle;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }
        .support-btn {
            background: transparent;
            color: #4A90E2;
            border: 1px solid #4A90E2;
        }
        .support-btn:hover { background: #4A90E2; color: white; }
        .menu-btn {
            background: transparent;
            color: #4A90E2;
            border: 1px solid #4A90E2;
            font-size: 1.2rem;
            padding: 0.4rem 0.6rem;
        }
        .menu-btn:hover { background: #4A90E2; color: white; }
        .lang-switch button {
            background: transparent;
            color: #4A90E2;
            border: 1px solid #4A90E2;
            border-radius: 1rem;
            padding: 0.4rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .lang-switch button:hover { background: #4A90E2; color: white; }
        .container {
            max-width: 600px; width: 100%;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.5rem 1.2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: left;
            margin-top: 4rem;
            margin-bottom: 2rem;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        h1 { font-size: 2rem; font-weight: 400; color: #5B4636; 
            font-family: "Times New Roman", "Georgia", "Songti SC", serif; 
            letter-spacing: 2px; margin-bottom: 1.5rem;     
            text-align: center; }
        .page-content {
            font-size: 1rem;
            color: #4A3F38;
            line-height: 1.8;
            white-space: pre-line;
        }
        .page-content img { max-width: 100%; border-radius: 1rem; margin: 1rem 0; }

        /* 下拉菜单 */
        .menu-dropdown { position: relative; }
        .menu-list {
            position: absolute; top: 2.8rem; right: 0;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            border-radius: 1rem; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            min-width: 120px; z-index: 110; display: none; flex-direction: column; overflow: hidden;
        }
        .menu-list.show { display: flex; }
        .menu-item {
            padding: 0.8rem 1.2rem; font-size: 0.9rem; color: #4A3F38;
            text-decoration: none; text-align: center; border-bottom: 1px solid #f0e6d8;
            transition: background 0.2s;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: #f5f0e6; }

        @media (max-width: 768px) {
            body { padding: 0.5rem 0.3rem; }
            .container { margin-top: 3.8rem; padding: 0.8rem 0.5rem; }
        }
    </style>
</head>
<body>

<div class="lang-switch">
    <div class="menu-dropdown">
        <button class="menu-btn" onclick="toggleMenu()" title="菜单">☰</button>
        <div class="menu-list" id="menuList">
            <a href="index.html" class="menu-item" data-zh="首页" data-en="Home">首页</a>
            <a href="story.html" class="menu-item" data-zh="幸福故事" data-en="The Story">幸福故事</a>
            <a href="support.html" class="menu-item" data-zh="支持我们" data-en="Support Us">支持我们</a>
            <a href="policies.html" class="menu-item" data-zh="政策协议" data-en="Policies">政策协议</a>
        </div>
    </div>
</div>

<div class="container">
    <h1 data-zh="致远塾" data-en="Voyage Academy">致远塾</h1>
    <div class="page-content" id="pageContent" data-zh="
致远塾位于中国济南，是一家以幸福架构为指导原则的私塾。
我们的教育目标，是帮助孩子们成长为具有卓越信念、服务人群社会、有责任感荣誉感的新时代栋梁。

<img src='1.jpg' alt='致远塾的孩子们'>
" data-en="
Voyage Academy is a private school in Jinan, China, guided by the principles of the Well-being Architecture.
Our mission is to help children become future leaders of character—grounded in strong values, dedicated to the common good, and driven by a sense of duty and pride.
<img src='1.jpg' alt='Children at Voyage Academy'>
"></div>
</div>

<script>
    // ========== 语言切换逻辑 ==========
    const langBtn = document.getElementById('langBtn');
    let currentLang = localStorage.getItem('lang') || 'zh';

    function applyLanguage(lang) {
        document.querySelectorAll('[data-zh][data-en]').forEach(el => {
            let text = lang === 'zh' ? el.getAttribute('data-zh') : el.getAttribute('data-en');
            if (text !== null && text !== '') {
                if (text.indexOf('<') !== -1 && text.indexOf('>') !== -1) {
                    el.innerHTML = text;
                } else {
                    el.textContent = text;
                }
            }
        });
     if (langBtn) {   // 只有按钮存在才改文字
        langBtn.textContent = lang === 'zh' ? 'EN' : '中文';
    }
    localStorage.setItem('lang', lang);
    }

    if (currentLang === 'en') {
        applyLanguage('en');
    } else {
        applyLanguage('zh');
    }

    window.switchLanguage = function() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        applyLanguage(currentLang);
    };

    // ========== 下拉菜单逻辑 ==========
    window.toggleMenu = function() {
        document.getElementById('menuList').classList.toggle('show');
    };
    document.addEventListener('click', function(event) {
        var menuDropdown = document.querySelector('.menu-dropdown');
        var menuList = document.getElementById('menuList');
        if (menuDropdown && !menuDropdown.contains(event.target) && menuList.classList.contains('show')) {
            menuList.classList.remove('show');
        }
    });
</script>
</body>
</html>
