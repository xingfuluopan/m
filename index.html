<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>幸福罗盘 · Happiness Compass</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f0e6;
            color: #3A2E28;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 400;
            color: #5B4636;
            font-family: "Times New Roman", "Georgia", "Songti SC", serif;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 1rem;
            color: #8B7355;
            margin-bottom: 1.5rem;
            font-weight: 400;
        }
        .description {
            text-align: left;
            font-size: 1rem;
            color: #4A3F38;
            background: rgba(255,255,255,0.5);
            border-radius: 1rem;
            padding: 1.2rem 1.2rem;
            margin-bottom: 2rem;
            line-height: 1.8;
        }
        .description p {
            margin-bottom: 0.6rem;
        }
        .cta-button {
            display: inline-block;
            background: #4A90E2;
            color: white;
            padding: 0.8rem 2.5rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            letter-spacing: 1px;
            transition: background 0.2s;
            margin-bottom: 1.5rem;
        }
        .cta-button:hover {
            background: #3A7BC8;
        }
        .footer {
            font-size: 0.85rem;
            color: #8B8B8B;
            margin-top: 1rem;
        }
        .footer a {
            color: #4A90E2;
            text-decoration: none;
        }
        .qr-section {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #666;
        }
        .qr-placeholder {
            display: inline-block;
            width: 120px;
            height: 120px;
            background: #E8E0D8;
            border-radius: 1rem;
            line-height: 120px;
            color: #999;
            font-size: 0.8rem;
            margin: 0.5rem 0;
        }
        hr {
            border: 0.5px solid #ddd;
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>幸福罗盘</h1>
        <div class="subtitle">Happiness Compass</div>
        
        <div class="description">
            <p><strong>🧭 来自人生幸福架构的评估工具</strong></p>
            <p>一个基于幸福核心要素的人类幸福指数理论体系。</p>
            <p>聚焦于个体可观测、可感知、可建设、可改善的部分，<br>帮助我们搭建属于自己的幸福。</p>
        </div>
        
        <!-- 👇 此处可以放 App Store 下载链接，准备好后替换 href 里的 # -->
        <a href="#" class="cta-button">📱 下载 App</a>
        
        <div class="qr-section">
            <p>或扫描二维码下载</p>
            <div class="qr-placeholder">二维码更新中</div>
        </div>
        
        <hr>
        
        <div class="footer">
            <p>© 2026 刘志国 · 保留所有权利</p>
            <p>联系邮箱：<a href="mailto:billylzg@outlook.com">your_email@example.com</a></p>
            <p><a href="#">隐私政策</a> | <a href="#">开源许可</a></p>
        </div>
    </div>
</body>
</html>
