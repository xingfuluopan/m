    <script>
        (function() {
            // 生成轮盘
            function polar(cx, cy, r, angleDeg) {
                const rad = (angleDeg * Math.PI) / 180;
                return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
            }
            function sectorPath(cx, cy, outerR, innerR, startAngle, endAngle) {
                const outStart = polar(cx, cy, outerR, startAngle);
                const outEnd = polar(cx, cy, outerR, endAngle);
                const inStart = polar(cx, cy, innerR, startAngle);
                const inEnd = polar(cx, cy, innerR, endAngle);
                const largeArc = (endAngle - startAngle) > 180 ? 1 : 0;
                return `M ${outStart.x} ${outStart.y} A ${outerR} ${outerR} 0 ${largeArc} 1 ${outEnd.x} ${outEnd.y} L ${inEnd.x} ${inEnd.y} A ${innerR} ${innerR} 0 ${largeArc} 0 ${inStart.x} ${inStart.y} Z`;
            }
            const colors = [
                "hsla(0, 80%, 65%, 0.9)",
                "hsla(51, 80%, 65%, 0.9)",
                "hsla(103, 80%, 65%, 0.9)",
                "hsla(154, 80%, 65%, 0.9)",
                "hsla(206, 80%, 65%, 0.9)",
                "hsla(257, 80%, 65%, 0.9)",
                "hsla(309, 80%, 65%, 0.9)"
            ];
            const cx = 140, cy = 140, outerR = 136, innerR = 48, step = 360 / 7;
            let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280">`;
            for (let i = 0; i < 7; i++) {
                const start = -90 + i * step;
                const end = start + step;
                svg += `<path d="${sectorPath(cx, cy, outerR, innerR, start, end)}" fill="${colors[i]}" />`;
            }
            svg += `<circle cx="${cx}" cy="${cy}" r="${innerR}" fill="none" />
                    <circle cx="${cx}" cy="${cy}" r="${outerR}" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="2" /></svg>`;
            document.getElementById('compass').innerHTML = svg;
        })();

        // 语言切换逻辑
        const langBtn = document.getElementById('langBtn');
        let currentLang = localStorage.getItem('lang') || 'zh';
        function applyLanguage(lang) {
            document.querySelectorAll('[data-zh][data-en]').forEach(el => {
                let text = lang === 'zh' ? el.getAttribute('data-zh') : el.getAttribute('data-en');
                if (text !== null && text !== '') {
                    if (text.indexOf('<') !== -1 && text.indexOf('>') !== -1) {
                        el.innerHTML = text;
                    } else {
                        el.textContent = text;
                    }
                }
            });
            langBtn.textContent = lang === 'zh' ? 'EN' : '中文';
            localStorage.setItem('lang', lang);
        }
        if (currentLang === 'en') {
            applyLanguage('en');
        } else {
            applyLanguage('zh');
        }

        // 菜单下拉切换
window.toggleMenu = function() {
    document.getElementById('menuList').classList.toggle('show');
};

// 点击菜单外部时关闭菜单
document.addEventListener('click', function(event) {
    var menuDropdown = document.querySelector('.menu-dropdown');
    var menuList = document.getElementById('menuList');
    if (menuDropdown && !menuDropdown.contains(event.target) && menuList.classList.contains('show')) {
        menuList.classList.remove('show');
    }
});

        window.switchLanguage = function() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            applyLanguage(currentLang);
        };
    </script>
